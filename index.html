<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MahaKhat - एकत्रित खत साठा अपलोड</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 20px; }
        .form-container { background-color: white; max-width: 800px; margin: 20px auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #2e7d32; }
        h2 { color: #2e7d32; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        
        /* मोबाईलवर कार्ड्स एकाखाली एक दिसतील आणि लॅपटॉपवर शेजारी-शेजारी */
        .upload-section { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        @media (min-width: 600px) { .upload-section { flex-direction: row; } }

        /* फाईल निवडण्यासाठी Label टॅग */
        .upload-card { display: block; flex: 1; width: 100%; border: 2px dashed; padding: 20px; text-align: center; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        
        .retailer-card { border-color: #2e7d32; background-color: #f1f8e9; }
        .wholesaler-card { border-color: #1565c0; background-color: #e3f2fd; }
        
        .upload-card input { display: none; }
        .upload-card h3 { margin-bottom: 10px; font-size: 18px; }
        .retailer-card h3 { color: #2e7d32; }
        .wholesaler-card h3 { color: #1565c0; }
        
        .file-status { margin-top: 10px; font-size: 14px; font-weight: bold; color: #d32f2f; }
        .status-ok { color: #2e7d32; }

        .btn-container { display: flex; margin-top: 25px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-submit { background: linear-gradient(135deg, #2e7d32 0%, #1565c0 100%); color: white; }
        .btn-submit:disabled { background: #cccccc; cursor: not-allowed; }
        
        .message { margin-top: 15px; text-align: center; font-size: 15px; font-weight: bold; white-space: pre-line; }
        .error-msg { color: #d32f2f; }
        .success-msg { color: #2e7d32; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>iFMS एकत्रित खत साठा अपलोड</h2>
    <p class="subtitle">रिटेलर आणि होलसेलर दोन्ही फाईल्स एकाच वेळी अपलोड करणे अनिवार्य आहे.</p>
    
    <div class="upload-section">
        <label class="upload-card retailer-card" for="retailerFile">
            <h3>🟢 रिटेलर फाईल</h3>
            <p>येथे क्लिक करून .csv/.xlsx निवडा</p>
            <input type="file" id="retailerFile" accept=".xlsx, .xls, .csv">
            <div id="retailerStatus" class="file-status">फाईल निवडलेली नाही</div>
        </label>

        <label class="upload-card wholesaler-card" for="wholesalerFile">
            <h3>🔵 होलसेलर फाईल</h3>
            <p>येथे क्लिक करून .csv/.xlsx निवडा</p>
            <input type="file" id="wholesalerFile" accept=".xlsx, .xls, .csv">
            <div id="wholesalerStatus" class="file-status">फाईल निवडलेली नाही</div>
        </label>
    </div>
    
    <div class="btn-container">
        <button id="uploadBtn" class="btn-submit" disabled>दोन्ही फाईल्स अपलोड करा</button>
    </div>
    
    <div id="msgWindow" class="message"></div>
</div>

<script>
    // तुमची अचूक वेब ॲप URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0jkH1Cbmhq1QEFC04ekzTazjMJlG5FPQ9UPa4QRQj_vlrX26bBqm3Zvze8NrHFu5k/exec"; 
    
    let parsedRetailerRows = null;
    let parsedWholesalerRows = null;

    document.addEventListener('DOMContentLoaded', function() {
        
        const retailerInput = document.getElementById('retailerFile');
        const wholesalerInput = document.getElementById('wholesalerFile');
        const uploadBtn = document.getElementById('uploadBtn');

        function processExcelFile(file, type, statusElem) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    let workbook;
                    if (file.name.toLowerCase().endsWith('.csv')) {
                        const textData = new TextDecoder("utf-8").decode(evt.target.result);
                        workbook = XLSX.read(textData, { type: 'string' });
                    } else {
                        const data = new Uint8Array(evt.target.result);
                        workbook = XLSX.read(data, { type: 'array' });
                    }

                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    let firstRowText = (rawData[0] || []).join(" ").toLowerCase();
                    
                    if (type === 'retailer' && !firstRowText.includes("retailer")) {
                        statusElem.textContent = "❌ ही रिटेलरची फाईल नाही!";
                        statusElem.className = "file-status error-msg";
                        parsedRetailerRows = null;
                        checkBothFiles();
                        return;
                    }
                    if (type === 'wholesaler' && !firstRowText.includes("wholesaler")) {
                        statusElem.textContent = "❌ ही होलसेलरची फाईल नाही!";
                        statusElem.className = "file-status error-msg";
                        parsedWholesalerRows = null;
                        checkBothFiles();
                        return;
                    }

                    let headerRowIndex = -1;
                    let searchKeyword = type === 'retailer' ? "district" : "district name";
                    
                    for(let i = 0; i < rawData.length; i++){
                        if(!rawData[i]) continue;
                        if(rawData[i].join(" ").toLowerCase().includes(searchKeyword)) {
                            headerRowIndex = i;
                            break;
                        }
                    }

                    if(headerRowIndex === -1) {
                        statusElem.textContent = "❌ योग्य कॉलम सापडला नाही!";
                        statusElem.className = "file-status error-msg";
                        if(type==='retailer') parsedRetailerRows = null; else parsedWholesalerRows = null;
                        checkBothFiles();
                        return;
                    }

                    const headers = rawData[headerRowIndex].map(h => String(h || "").trim());
                    const jsonRows = [];
                    
                    for(let i = headerRowIndex + 1; i < rawData.length; i++){
                        let row = rawData[i];
                        if(row.length === 0 || !row.join("").trim()) continue; 
                        
                        let obj = {};
                        for(let j = 0; j < headers.length; j++){
                            if(headers[j]) obj[headers[j]] = row[j] !== undefined ? row[j] : "";
                        }
                        let distValue = obj['District'] || obj['District Name'];
                        if(distValue && String(distValue).trim() !== "") {
                            jsonRows.push(obj);
                        }
                    }

                    if(jsonRows.length === 0) {
                        statusElem.textContent = "❌ फाईलमध्ये डेटा नाही.";
                        statusElem.className = "file-status error-msg";
                        if(type==='retailer') parsedRetailerRows = null; else parsedWholesalerRows = null;
                    } else {
                        statusElem.textContent = `✅ तयार! (${jsonRows.length} रेकॉर्ड्स)`;
                        statusElem.className = "file-status status-ok";
                        if(type==='retailer') parsedRetailerRows = jsonRows; else parsedWholesalerRows = jsonRows;
                    }
                    
                    checkBothFiles();

                } catch (error) {
                    statusElem.textContent = "❌ फाईल वाचण्यात त्रुटी!";
                    statusElem.className = "file-status error-msg";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function checkBothFiles() {
            const msgWin = document.getElementById('msgWindow');
            if (parsedRetailerRows && parsedWholesalerRows) {
                uploadBtn.disabled = false;
                msgWin.textContent = "दोन्ही फाईल्स यशस्वीरित्या वाचल्या. आता डेटा अपलोड करा.";
                msgWin.className = "message success-msg";
            } else {
                uploadBtn.disabled = true;
                msgWin.textContent = "";
                msgWin.className = "message";
            }
        }

        retailerInput.addEventListener('change', function(e) {
            if(e.target.files[0]) processExcelFile(e.target.files[0], 'retailer', document.getElementById('retailerStatus'));
        });

        wholesalerInput.addEventListener('change', function(e) {
            if(e.target.files[0]) processExcelFile(e.target.files[0], 'wholesaler', document.getElementById('wholesalerStatus'));
        });

        uploadBtn.addEventListener('click', function() {
            if (!parsedRetailerRows || !parsedWholesalerRows) return;

            const msgWin = document.getElementById('msgWindow');
            msgWin.className = "message success-msg";
            msgWin.textContent = "प्रक्रिया सुरू आहे... डेटा अपडेट होत आहे, कृपया थांबा.";
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'अपलोड होत आहे...';

            const payload = {
                action: 'uploadAllStock',
                retailerRows: parsedRetailerRows,
                wholesalerRows: parsedWholesalerRows
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json()) 
            .then(data => {
                uploadBtn.textContent = "दोन्ही फाईल्स अपलोड करा";
                if (data.success) {
                    msgWin.className = "message success-msg";
                    msgWin.textContent = "✅ " + data.message;
                    
                    parsedRetailerRows = null;
                    parsedWholesalerRows = null;
                    retailerInput.value = "";
                    wholesalerInput.value = "";
                    document.getElementById('retailerStatus').textContent = "फाईल निवडलेली नाही";
                    document.getElementById('retailerStatus').className = "file-status";
                    document.getElementById('wholesalerStatus').textContent = "फाईल निवडलेली नाही";
                    document.getElementById('wholesalerStatus').className = "file-status";
                } else {
                    msgWin.className = "message error-msg";
                    msgWin.textContent = "❌ त्रुटी: " + data.message;
                    uploadBtn.disabled = false;
                }
            })
            .catch(error => {
                uploadBtn.textContent = "दोन्ही फाईल्स अपलोड करा";
                uploadBtn.disabled = false;
                msgWin.className = "message error-msg";
                msgWin.textContent = "❌ नेटवर्क त्रुटी. सर्व्हरशी संपर्क होऊ शकला नाही.";
            });
        });
    });
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('ServiceWorker registration successful');
                })
                .catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
        });
    }
</script>

</body>
</html>
