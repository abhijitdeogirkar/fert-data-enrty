<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MahaKhat - एकत्रित खत साठा अपलोड</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="main-wrapper">
    <div class="form-container">
        <div class="google-top-border"></div>
        
        <div class="header-section">
            <h2>iFMS एकत्रित खत साठा अपलोड</h2>
            <p>रिटेलर आणि होलसेलर दोन्ही फाईल्स एकाच वेळी अपलोड करणे अनिवार्य आहे.</p>
        </div>
        
        <div class="upload-section">
            <div class="upload-card retailer-card" onclick="document.getElementById('retailerFile').click()">
                <div class="card-icon">🏪</div>
                <h3>रिटेलर फाईल</h3>
                <p>.csv किंवा .xlsx फाईल निवडा</p>
                <input type="file" id="retailerFile" accept=".xlsx, .xls, .csv">
                <div id="retailerStatus" class="file-status">फाईल निवडलेली नाही</div>
            </div>

            <div class="upload-card wholesaler-card" onclick="document.getElementById('wholesalerFile').click()">
                <div class="card-icon">🏢</div>
                <h3>होलसेलर फाईल</h3>
                <p>.csv किंवा .xlsx फाईल निवडा</p>
                <input type="file" id="wholesalerFile" accept=".xlsx, .xls, .csv">
                <div id="wholesalerStatus" class="file-status">फाईल निवडलेली नाही</div>
            </div>
        </div>
        
        <div class="btn-container">
            <a href="../dashboard.html" class="btn-back">मागे जा</a>
            <button id="uploadBtn" class="btn-submit" disabled>दोन्ही फाईल्स अपलोड करा</button>
        </div>
        
        <div id="msgWindow" class="message"></div>
    </div>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
